<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>EasyTV - Player Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv...">
    
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="favicon.ico" type="image/ico">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo.png">
    
    <!-- Biblioteca HLS para rodar streaming m3u8 nativamente no navegador -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Ícones Modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-red: #e50914; /* Vermelho vibrante EasyTV */
            --primary-red-hover: #b80710;
            --dark-bg: #1a1515; /* Cinza escuro avermelhado */
            --card-bg: #261f1f; /* Variação de cinza para os cards */
            --text-color: #ffffff;
            --text-secondary: #b3a7a7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header / Top Toolbar */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 250;
            height: 80px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary-red);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(229, 9, 20, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toolbar-btn:hover {
            background: var(--primary-red);
            border-color: var(--primary-red);
            transform: scale(1.05);
        }

        .toolbar-btn i {
            color: var(--text-color);
            font-size: 16px;
        }

        .toolbar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-title i {
            color: var(--primary-red);
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Link Input Customizado */
        .link-input-wrapper {
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .link-input-wrapper.show {
            display: flex;
        }
        
        .link-input {
            width: 280px;
            padding: 10px 15px;
            border: 1px solid rgba(229, 9, 20, 0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .link-input:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
        }
        
        .play-link-btn {
            padding: 10px 18px;
            background: var(--primary-red);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .play-link-btn:hover {
            background: var(--primary-red-hover);
            transform: scale(1.02);
        }

        /* Container Principal */
        .main-container {
            display: flex;
            flex: 1;
            padding: 0 40px 40px 40px;
            gap: 30px;
            height: calc(100vh - 80px);
            position: relative;
        }

        /* Área do Player de Vídeo */
        .player-container {
            flex: 3;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(229, 9, 20, 0.2);
            transition: all 0.4s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Lateral Direita - Lista de Canais */
        .sidebar {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            display: none;
        }

        .sidebar-header-wrapper {
            padding: 20px 20px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header-wrapper h3 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header-wrapper h3 i {
            color: var(--primary-red);
        }

        .channel-count {
            background: rgba(229, 9, 20, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--primary-red);
            font-weight: bold;
        }

        /* Caixa de Busca */
        .search-box {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
        }

        /* Lista Dinâmica de Canais */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Custom Scrollbar */
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: var(--primary-red);
            border-radius: 10px;
        }
        .channel-list::-webkit-scrollbar-track {
            background-color: rgba(0,0,0,0.1);
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            position: relative;
        }

        .channel-item:hover, .channel-item.active {
            background-color: rgba(229, 9, 20, 0.1);
            border-left-color: var(--primary-red);
            transform: translateX(4px);
        }

        .channel-icon {
            width: 35px;
            height: 35px;
            background-color: var(--primary-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(229, 9, 20, 0.3);
            flex-shrink: 0;
        }

        .channel-info {
            flex: 1;
            overflow: hidden;
        }

        .channel-info h4 {
            font-size: 14px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-item .favorite-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: var(--text-secondary);
            font-size: 14px;
            margin-left: auto;
            padding: 5px;
        }
        
        .channel-item:hover .favorite-btn,
        .channel-item .favorite-btn.active {
            opacity: 1;
        }
        
        .channel-item .favorite-btn.active {
            color: var(--primary-red);
        }

        /* Estados de Feedback Dinâmicos */
        .loading-state, .no-channels {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 150px;
            color: var(--text-secondary);
            gap: 12px;
            text-align: center;
        }
        
        .loading-state i {
            font-size: 28px;
            color: var(--primary-red);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Botões Flutuantes de Ação e Painel de Favoritos */
        .action-buttons {
            position: absolute;
            left: 55px;
            bottom: 55px;
            display: flex;
            gap: 12px;
            z-index: 50;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(229, 9, 20, 0.4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: var(--primary-red);
            border-color: var(--primary-red);
            transform: scale(1.1);
        }
        
        .action-btn i {
            color: #fff;
            font-size: 16px;
        }
        
        .favorite-panel {
            position: absolute;
            left: 55px;
            bottom: 115px;
            width: 260px;
            max-height: 350px;
            background: rgba(26, 21, 21, 0.95);
            border: 1px solid rgba(229, 9, 20, 0.4);
            border-radius: 12px;
            display: none;
            z-index: 60;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .favorite-panel.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .favorite-panel-header {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .favorite-panel-header h4 {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-panel-header h4 i {
            color: var(--primary-red);
        }
        
        .favorite-panel-content {
            max-height: 290px;
            overflow-y: auto;
            padding: 10px;
        }

        /* Ocultar Elementos Antigos Legados */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle {
            display: none !important;
        }

        /* Responsividade Avançada */
        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
                padding: 0 20px 20px 20px;
            }
            header {
                padding: 20px;
            }
            .player-container {
                height: 50vw;
                min-height: 300px;
                flex: none;
            }
            .sidebar {
                height: 450px;
                flex: none;
            }
            body {
                overflow: auto;
            }
            .action-buttons {
                left: 35px;
                bottom: 35px;
            }
            .favorite-panel {
                left: 35px;
                bottom: 95px;
            }
        }

        @media (max-width: 576px) {
            .link-input-wrapper.show {
                position: absolute;
                top: 80px;
                left: 20px;
                right: 20px;
                background: var(--card-bg);
                padding: 10px;
                border-radius: 8px;
                z-index: 300;
                box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            }
            .link-input {
                width: 100%;
            }
            .toolbar-title {
                font-size: 14px;
            }
        }
    </style>
</head>

    <script>
        // ==========================================
// LOGICA DE INSTALAÇÃO DO PWA (Botão Instalar)
// ==========================================
var deferredPrompt;
var pwaBtn = document.getElementById('pwaInstallBtn');

// Escuta o evento que o navegador dispara quando detecta o manifest + sw
window.addEventListener('beforeinstallprompt', function(e) {
    // Previne que o navegador mostre o banner padrão imediatamente
    e.preventDefault();
    // Armazena o evento para ser disparado pelo nosso botão customizado
    deferredPrompt = e;
    // Torna o botão visível na barra de ferramentas
    if (pwaBtn) {
        pwaBtn.style.display = 'flex';
    }
});

// Ação ao clicar no botão de instalação
if (pwaBtn) {
    pwaBtn.addEventListener('click', function() {
        if (!deferredPrompt) return;
        
        // Mostra o prompt de instalação nativo
        deferredPrompt.prompt();
        
        // Verifica a escolha do usuário
        deferredPrompt.userChoice.then(function(choiceResult) {
            if (choiceResult.outcome === 'accepted') {
                console.log('Usuário aceitou a instalação do app.');
            } else {
                console.log('Usuário cancelou a instalação.');
            }
            // Limpa o prompt para que não possa ser reutilizado
            deferredPrompt = null;
            pwaBtn.style.display = 'none';
        });
    });
}

// Oculta o botão se o aplicativo já tiver sido instalado com sucesso
window.addEventListener('appinstalled', function(evt) {
    console.log('Aplicativo instalado com sucesso!');
    if (pwaBtn) {
        pwaBtn.style.display = 'none';
    }
});

// Registro inicial do Service Worker (Substitua 'sw.js' pelo caminho do seu arquivo)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
            console.log('ServiceWorker registrado com escopo: ', registration.scope);
        }, function(err) {
            console.log('Falha ao registrar o ServiceWorker: ', err);
        });
    });
}

        // TV Player JS - Native JavaScript (No jQuery) - Hls.js & Multi-Country Edition

var channels = [];
var hlsInstance = null; 
var currentChannelIndex = -1;  

var FAV_PREFIX = 'fav_tvplay_';

function $(selector) {
    return document.querySelector(selector);
}

function $$(selector) {
    return document.querySelectorAll(selector);
}

document.addEventListener('DOMContentLoaded', function() {
    var video = $('#video1');

    if (video) {
        video.addEventListener('ended', function() {
            if (currentChannelIndex >= 0 && currentChannelIndex < channels.length - 1) {
                var nextIndex = currentChannelIndex + 1;
                var nextUrl = channels[nextIndex].url || channels[nextIndex];
                var nextItem = $$('.channel-item')[nextIndex];
                var nextName = nextItem.dataset.name;
                playChannel(nextUrl, nextName);
                $$('.channel-item').forEach(function(el) { el.classList.remove('active'); });
                nextItem.classList.add('active');
            }
        });
    }
    
    // Parâmetros da URL
    var urlParams = new URLSearchParams(window.location.search);
    var type = urlParams.get('type') || 'countries';
    var key = urlParams.get('key') || 'br'; // Padrão Brasil se não houver parâmetro
    var title = urlParams.get('title') || 'Brasil';

    document.title = decodeURIComponent(title) + ' - TV Player';
    var categoryTitleEl = $('#categoryTitle');
    if (categoryTitleEl) categoryTitleEl.textContent = decodeURIComponent(title);

    // Inicializa a lista de países no menu suspenso
    initCountryDropdown(key);

    // Carrega os canais iniciais (baseados na URL ou padrão BR)
    var apiUrl = 'https://iptv-org.github.io/iptv/' + type + '/' + key + ".m3u";
    loadChannels(apiUrl);
    
    loadFavorites();
    
    // ========== Eventos de Interface ==========
    
    // Listener do Dropdown de Países
    var countrySelect = $('#countrySelect');
    if (countrySelect) {
        countrySelect.addEventListener('change', function() {
            var selectedCountryCode = this.value;
            var selectedCountryName = this.options[this.selectedIndex].text;
            
            if (selectedCountryCode) {
                // Atualiza títulos na tela
                if (categoryTitleEl) categoryTitleEl.textContent = selectedCountryName;
                document.title = selectedCountryName + ' - TV Player';
                
                // Força a API a buscar a lista do país selecionado
                var newApiUrl = 'https://iptv-org.github.io/iptv/countries/' + selectedCountryCode + '.m3u';
                loadChannels(newApiUrl);
            }
        });
    }

    // Toggle sidebar
    var toggleSidebarBtn = $('#toggleSidebar');
    if (toggleSidebarBtn) {
        toggleSidebarBtn.addEventListener('click', function() {
            var sidebar = $('#sidebar');
            if (sidebar) sidebar.classList.toggle('collapsed');
        });
    }
    
    // Play Custom Link
    var playLinkBtn = $('#playLinkBtn');
    if (playLinkBtn) {
        playLinkBtn.addEventListener('click', function() {
            var link = $('#linkInput').value.trim();
            if (link) playChannel(link, 'Link Personalizado');
        });
    }
    
    // Channel Search
    var channelSearch = $('#channelSearch');
    if (channelSearch) {
        channelSearch.addEventListener('input', function() {
            var searchTerm = this.value.toLowerCase();
            $$('#channelList .channel-item').forEach(function(item) {
                var name = item.querySelector('.channel-name').textContent.toLowerCase();
                item.style.display = (name.indexOf(searchTerm) > -1) ? '' : 'none';
            });
        });
    }
    
    // Delegation de cliques na lista de canais
    var channelListEl = $('#channelList');
    if (channelListEl) {
        channelListEl.addEventListener('click', function(e) {
            var favoriteBtnClick = e.target.closest('.favorite-btn');
            if (favoriteBtnClick) {
                e.stopPropagation();
                var channelItem = favoriteBtnClick.closest('.channel-item');
                var url = channelItem.dataset.url;
                var name = channelItem.dataset.name;
                
                if (favoriteBtnClick.classList.contains('active')) {
                    localStorage.removeItem(FAV_PREFIX + url);
                    favoriteBtnClick.classList.remove('active');
                } else {
                    localStorage.setItem(FAV_PREFIX + url, name);
                    favoriteBtnClick.classList.add('active');
                }
                loadFavorites();
                return;
            }
            
            var channelItem = e.target.closest('.channel-item');
            if (channelItem) {
                var url = channelItem.dataset.url;
                var name = channelItem.dataset.name;
                $$('.channel-item').forEach(function(el) { el.classList.remove('active'); });
                channelItem.classList.add('active');
                playChannel(url, name);
            }
        });
    }
});

// Busca todos os países disponíveis na API para alimentar o Menu Superior
function initCountryDropdown(activeKey) {
    fetch('https://iptv-org.github.io/api/countries.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var countrySelect = $('#countrySelect');
            if (!countrySelect) return;
            
            // Ordena alfabeticamente
            data.sort(function(a, b) { return a.name.localeCompare(b.name); });
            
            var html = '';
            data.forEach(function(country) {
                var code = country.code.toLowerCase();
                // Marca como selecionado o país atual do player
                var selected = (code === activeKey.toLowerCase()) ? 'selected' : '';
                html += '<option value="' + code + '" ' + selected + '>' + country.flag + ' ' + country.name + '</option>';
            });
            
            countrySelect.innerHTML = html;
        })
        .catch(function() {
            var countrySelect = $('#countrySelect');
            if (countrySelect) countrySelect.innerHTML = '<option value="">Erro ao carregar lista</option>';
        });
}

// Carrega os canais M3U filtrados
function loadChannels(apiUrl) {
    $('#channelList').innerHTML = '<div class="no-channels"><p>Carregando canais...</p></div>';
    channels = []; // Limpa cache anterior
    
    fetch(apiUrl)
        .then(function(response) { return response.text(); })
        .then(function(message) {
            var parsedChannels = [];
            var lines = message.split('\n');
            var currentName = "Canal Sem Nome";
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    var commaIndex = line.indexOf(',');
                    if (commaIndex !== -1) {
                        currentName = line.substring(commaIndex + 1).trim();
                    }
                } else if (line.startsWith('http') && line.includes('.m3u8')) {
                    parsedChannels.push({
                        name: currentName,
                        url: line,
                        isFavorite: window.localStorage.getItem(FAV_PREFIX + line) !== null
                    });
                    channels.push(line);
                    currentName = "Canal Sem Nome";
                }
            }
            
            renderChannelList(parsedChannels);
        })
        .catch(function() {
            $('#channelList').innerHTML = '<div class="no-channels"><i class="fas fa-exclamation-triangle"></i><p>Nenhum canal ativo para este país</p></div>';
        });
}

function renderChannelList(channelList) {
    $('#channelList').innerHTML = '';
    var countEl = $('#channelCount');
    if (countEl) countEl.textContent = channelList.length;
    
    if (channelList.length === 0) {
        $('#channelList').innerHTML = '<div class="no-channels"><i class="fas fa-tv"></i><p>Nenhum canal encontrado</p></div>';
        return;
    }
    
    var html = '';
    channelList.forEach(function(channel, index) {
        var isFav = channel.isFavorite ? 'active' : '';
        var isActive = index === 0 ? 'active' : '';
        html += '<div class="channel-item ' + isActive + '" data-url="' + channel.url + '" data-name="' + channel.name + '">';
        html += '    <div class="channel-icon"><i class="fas fa-tv"></i></div>';
        html += '    <div class="channel-info"><h4 class="channel-name">' + channel.name + '</h4></div>';
        html += '    <i class="fas fa-heart favorite-btn ' + isFav + '"></i>';
        html += '</div>';
    });
    
    $('#channelList').innerHTML = html;
    
    if (channelList.length > 0) {
        playChannel(channelList[0].url, channelList[0].name);
    }
}

function playChannel(url, name) {
    var video = document.getElementById('video1');
    if (!video) return;

    for (var i = 0; i < channels.length; i++) {
        var chUrl = channels[i].url || channels[i];
        if (chUrl === url) {
            currentChannelIndex = i;
            break;
        }
    }
    
    if (hlsInstance) {
        hlsInstance.destroy();
    }

    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play().catch(function() { console.log("Autoplay retido pelo navegador."); });
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function () {
            video.play().catch(function() { console.log("Autoplay retido."); });
        });
    }
    
    var currentChannelEl = $('#currentChannel');
    if (currentChannelEl) currentChannelEl.textContent = name;
}

function loadFavorites() {
    var favorites = [];
    Object.keys(localStorage).forEach(function(key) {
        if (key.startsWith(FAV_PREFIX)) {
            favorites.push({ url: key.replace(FAV_PREFIX, ''), name: localStorage.getItem(key) });
        }
    });
    
    var favCountEl = $('#favCount');
    if (favCountEl) favCountEl.textContent = favorites.length;
}

</script>
